<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PureMarine — Kuis Pengetahuan</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;1,9..40,300&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/style.css">
</head>
<body>

<div class="page-wrapper">
    <div class="module-container">

        <div class="section-title">
            Quiz Modul
        </div>

        <p class="module-paragraph">
            Jawab 10 pertanyaan berikut berdasarkan materi yang telah dipelajari.
        </p>

        <form id="quizForm">

            <div th:each="quiz,stat : ${quizzes}" class="quiz-card">

                <div class="quiz-question">
                    [[${stat.count}]]. [[${quiz.question}]]
                </div>

                <label class="quiz-option">
                <input type="radio"
                      th:name="'q'+${quiz.id}"
                      value="A">
                <span>A. [[${quiz.optionA}]]</span>
            </label>

            <label class="quiz-option">
                <input type="radio"
                      th:name="'q'+${quiz.id}"
                      value="B">
                <span>B. [[${quiz.optionB}]]</span>
            </label>

            <label class="quiz-option">
                <input type="radio"
                      th:name="'q'+${quiz.id}"
                      value="C">
                <span>C. [[${quiz.optionC}]]</span>
            </label>

            <label class="quiz-option">
                <input type="radio"
                      th:name="'q'+${quiz.id}"
                      value="D">
                <span>D. [[${quiz.optionD}]]</span>
            </label>
            </div>

            <button type="submit" class="finish-btn">
                Selesai Quiz
            </button>

        </form>

    </div>
</div>

</body>

<!-- TOAST & SCRIPT -->
<div class="toast" id="toast"></div>
<script src="/js.js"></script>

</body>
</html>
